name: 定期运行爬虫并发送邮件

on:
  push:
    branches:
      - master  # 替换为您主要使用的分支名称，如 'main'
    paths-ignore:
      - data.json  # 忽略对 data.json 的推送，避免无限循环
  schedule:
    - cron: '0 11 * * *'  # 每天 UTC 时间 9:00 执行
  workflow_dispatch:    # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    environment: email_env  # 指定使用的环境

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史，以便进行提交

      - name: 设置 Go 环境
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'  # 根据您的 Go 版本调整

      - name: 获取依赖
        run: go mod tidy

      - name: 运行爬虫程序
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: go run main.go

      - name: 配置 Git 用户
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: 检查并提交 data.json 的更改
        run: |
          if [[ `git status --porcelain data.json` ]]; then
            git add data.json
            git commit -m "Update data.json by GitHub Actions"
            git push
          else
            echo "No changes to data.json"
          fi
